name: Python CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
      - name: Run flake8
        run: flake8 src setup.py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest pytest-cov
      - name: Run tests and coverage
        run: pytest --cov=src/openapi_servo_control --cov-report=xml --cov-report=term
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: coverage.xml
          fail_ci_if_error: false

  deploy:
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, pi-deploy]
    env:
      PI_HOST: pi@pizero.local
      PI_REPO_DIR: /opt/openapi-servo-controll
    steps:
      - name: Deploy to Pi Zero over SSH
        run: |
          ssh -o StrictHostKeyChecking=accept-new -o BatchMode=yes "$PI_HOST" bash -s <<EOF
          set -euo pipefail
          cd "$PI_REPO_DIR"
          git fetch --prune origin
          git reset --hard origin/main
          sudo systemctl restart servo-control
          sudo systemctl is-active servo-control
          EOF
