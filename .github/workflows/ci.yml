name: Python CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
      - name: Run flake8
        run: flake8 src setup.py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest pytest-cov
      - name: Run tests and coverage
        run: pytest --cov=src/openapi_servo_control --cov-report=xml --cov-report=term
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: coverage.xml
          fail_ci_if_error: false

  deploy:
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, pi-deploy]
    env:
      PI_HOST: ${{ secrets.PI_HOST }}
    steps:
      - name: Check PI_HOST secret
        id: check
        run: |
          if [ -z "${PI_HOST:-}" ]; then
            echo "PI_HOST secret is not configured; skipping deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Checkout
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v4
      - name: Install ssh client
        if: steps.check.outputs.skip == 'false'
        run: |
          if ! command -v scp >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends openssh-client
          fi
      - name: Install uv
        if: steps.check.outputs.skip == 'false'
        uses: astral-sh/setup-uv@v5
      - name: Build wheel
        if: steps.check.outputs.skip == 'false'
        run: |
          rm -rf dist/
          uv build --wheel
      - name: Ship wheel to Pi and restart service
        if: steps.check.outputs.skip == 'false'
        run: |
          set -euo pipefail
          shopt -s nullglob
          wheels=(dist/*.whl)
          if [ ${#wheels[@]} -ne 1 ]; then
            echo "Expected exactly one wheel in dist/, got ${#wheels[@]}: ${wheels[*]}"
            exit 1
          fi
          WHEEL="${wheels[0]}"
          REMOTE_WHEEL="/tmp/$(basename "$WHEEL")"

          # pi-ssh-key Secret is mounted at ~/.ssh as root:root 0600 and
          # readOnly, so the runner user can't read it or write known_hosts.
          # Copy the key out with the right perms and use a writable
          # known_hosts under /tmp for this step. Use mktemp so repeated
          # runs on the same runner can't collide on a stale /tmp file.
          SRC_KEY="$HOME/.ssh/id_ed25519"
          if ! sudo test -f "$SRC_KEY"; then
            echo "SSH key not found at $SRC_KEY - is the pi-ssh-key Secret mounted?" >&2
            exit 1
          fi
          SSH_KEY="$(mktemp /tmp/pi_ssh_key.XXXXXX)"
          KNOWN_HOSTS="$(mktemp /tmp/pi_known_hosts.XXXXXX)"
          sudo install -o "$(id -u)" -g "$(id -g)" -m 0600 \
              "$SRC_KEY" "$SSH_KEY"
          trap 'rm -f "$SSH_KEY" "$KNOWN_HOSTS"' EXIT

          SSH_OPTS=(
            -i "$SSH_KEY"
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=accept-new
            -o UserKnownHostsFile="$KNOWN_HOSTS"
            -o BatchMode=yes
          )

          scp "${SSH_OPTS[@]}" "$WHEEL" "$PI_HOST:$REMOTE_WHEEL"
          ssh "${SSH_OPTS[@]}" "$PI_HOST" bash -s -- "$REMOTE_WHEEL" <<'EOF'
          set -euo pipefail
          WHEEL="$1"
          VENV=/opt/servo-venv
          BIN_LINK=/usr/local/bin/openapi-servo-control
          if [ ! -d "$VENV" ]; then
            sudo uv venv --python python3 "$VENV"
          fi
          sudo uv pip install --python "$VENV/bin/python" --upgrade "$WHEEL"
          sudo ln -sf "$VENV/bin/openapi-servo-control" "$BIN_LINK"
          rm -f "$WHEEL"
          sudo systemctl restart servo-control
          sudo systemctl is-active servo-control
          EOF
